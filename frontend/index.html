<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Complaint System</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white">


<header class="border-b border-white/10 bg-slate-900/80 backdrop-blur-xl sticky top-0">
  <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">

    <h1 class="text-2xl font-bold text-cyan-400">
      Smart Complaint System
    </h1>

    <button onclick="fetchRestaurants()"
      class="bg-white/10 px-4 py-2 rounded-xl hover:bg-white/20 transition">
      🔄 Atualizar
    </button>

  </div>
</header>


<div class="max-w-7xl mx-auto px-6 py-8">

  <h2 class="text-4xl font-bold mb-2">
    Dashboard de Restaurantes
  </h2>

  <p class="text-slate-400 mb-6">
    Monitoramento em tempo real • Identificação de risco
  </p>

  
  <input
    id="search"
    oninput="handleSearch(event)"
    placeholder="Buscar restaurante..."
    class="w-full mb-8 p-4 rounded-xl bg-slate-900 border border-white/10 focus:border-cyan-400 outline-none transition"
  />

  
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">

    <div class="bg-slate-900 p-6 rounded-xl border border-white/10">
      <p class="text-slate-400">Total</p>
      <h2 id="total" class="text-3xl font-bold"></h2>
    </div>

    <div class="bg-red-500/10 p-6 rounded-xl border border-red-500/20">
      <p class="text-red-400">Críticos</p>
      <h2 id="critical" class="text-3xl font-bold text-red-400"></h2>
    </div>

    <div class="bg-yellow-500/10 p-6 rounded-xl border border-yellow-400/20">
      <p class="text-yellow-400">Alertas</p>
      <h2 id="alert" class="text-3xl font-bold text-yellow-400"></h2>
    </div>

  </div>

  
  <div id="list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</div>

<script src="script.js"></script>

</body>
</html>
